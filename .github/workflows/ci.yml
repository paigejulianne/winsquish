name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# WinSquish is a Windows/MSVC project that links the vendored libsquish DLL
# (squish/squish.dll + squish.lib), so the whole pipeline runs on Windows.
jobs:
  build-test:
    name: Build & test (MSVC x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Puts cl.exe / rc.exe on PATH so build.bat takes its fast path.
      - name: Set up MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Build winsquish.exe
        shell: cmd
        run: call build.bat

      - name: Sanity check outputs
        shell: pwsh
        run: |
          foreach ($f in 'build\winsquish.exe','build\squish.dll') {
            if (-not (Test-Path $f)) { throw "missing build output: $f" }
          }
          Write-Host "winsquish.exe = $((Get-Item build\winsquish.exe).Length) bytes"

      # Drives the GUI headlessly (launch -> poll for output -> terminate) and
      # verifies folder, single-file, and self-extracting round-trips by hash.
      - name: Round-trip tests
        shell: pwsh
        run: ./test/roundtrip.ps1 -Exe build/winsquish.exe

      - name: Upload winsquish binaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: winsquish-x64
          path: |
            build/winsquish.exe
            build/squish.dll
          if-no-files-found: error

  installer:
    name: Build installer (Inno Setup)
    runs-on: windows-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      # build-installer.bat builds winsquish.exe first (it is missing here),
      # then compiles winsquish.iss — validating that the DLL is packaged.
      - name: Build setup.exe
        shell: cmd
        run: call installer\build-installer.bat

      - name: Upload installer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: winsquish-setup
          path: build/winsquish-setup.exe
          if-no-files-found: error
